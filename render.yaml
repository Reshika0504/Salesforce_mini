services:
    - type: web
      name: salesforce-mini-backend
      runtime: node
      rootDir: backend
      buildCommand: npm install
      startCommand: npm start
      healthCheckPath: /api/health
      envVars:
          - key: NODE_VERSION
            value: 20
          - key: MONGODB_URI
            sync: false
          - key: JWT_SECRET
            generateValue: true
          - key: JWT_EXPIRES_IN
            value: 1d
          - key: CLIENT_ORIGIN
            value: https://salesforce-mini-frontend.onrender.com

    - type: web
      name: salesforce-mini-frontend
      runtime: static
      rootDir: frontend
      buildCommand: npm install && npm run build
      staticPublishPath: ./dist
      envVars:
          - key: NODE_VERSION
            value: 20
          - key: VITE_API_BASE_URL
            sync: false
      routes:
          - type: rewrite
            source: /*
            destination: /index.html
